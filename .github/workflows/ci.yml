name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    strategy:
      matrix:
        # macos-14 runners cap at Xcode 16.2 (Swift 6.0); the app source needs Swift 6.1+.
        macos_version: [macos-15, macos-26]
      fail-fast: false
    runs-on: ${{ matrix.macos_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download Metal Toolchain
        # The downloadable Metal Toolchain is an Xcode 26+ (macOS 26) component; older Xcode ships metal.
        run: |
          sudo xcodebuild -runFirstLaunch || true
          MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          if [ "$MAJOR" -ge 26 ]; then
            downloaded=false
            for i in 1 2 3 4 5; do
              if sudo xcodebuild -downloadComponent MetalToolchain; then downloaded=true; break; fi
              sleep 10
            done
            if [ "$downloaded" = false ] && ! xcrun -f metal >/dev/null 2>&1; then
              echo "::error::Metal Toolchain download failed after 5 attempts and metal is unavailable."
              exit 1
            fi
          else
            echo "macOS $MAJOR: Metal ships with Xcode, skipping download."
          fi

      - name: Build
        # UI automation of the notch/accessory app is not driveable on headless
        # GitHub-hosted runners, so CI compiles the app instead of running XCUITest.
        run: |
          sudo DevToolsSecurity -enable

          # Strip mach-services entitlement (amfid kills ad-hoc app); ignore only "key absent".
          if ! plutil_out=$(plutil -remove com.apple.security.mach-services DynamicIsland/DynamicIsland.entitlements 2>&1); then
            if printf '%s' "$plutil_out" | grep -q "No value to remove"; then
              echo "mach-services entitlement already absent, continuing."
            else
              echo "::error::plutil failed to modify entitlements: $plutil_out"
              exit 1
            fi
          fi

          xcodebuild build \
            -project DynamicIsland.xcodeproj \
            -scheme DynamicIsland \
            -destination "platform=macOS" \
            -resultBundlePath BuildResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=YES

      - name: Surface Failure Diagnostics
        if: failure()
        run: |
          echo "===== build failure summary ====="
          xcrun xcresulttool get build-results --path BuildResults.xcresult 2>/dev/null \
            || xcrun xcresulttool get --path BuildResults.xcresult --format json 2>/dev/null | head -c 20000 \
            || echo "No xcresult available."

      - name: Upload Build Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results-${{ matrix.macos_version }}
          path: BuildResults.xcresult
          if-no-files-found: ignore
          retention-days: 7
